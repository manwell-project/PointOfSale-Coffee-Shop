<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#8B4513" />
  <title>DigiCaf - Judul Halaman</title>

  <!--
    CONTENT-ONLY TEMPLATE (Framework7)
    Kamu cukup edit konten di dalam <div class="view view-main"> saja.
    Header + wrapper akan di-inject oleh js/layout.js.

    PENTING: sesuaikan ASSET PREFIX (../ atau ./) sesuai lokasi file.
  -->

  <link rel="stylesheet" href="../node_modules/framework7/framework7-bundle.css" />
  <link rel="stylesheet" href="../css/shared-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!--
    Untuk Framework7, root harus tetap #app agar app.js (el: '#app') tidak rusak.
    Layout tetap bisa di-inject karena kita opt-in via data-digicaf-layout.
  -->
  <div
    id="app"
    data-digicaf-layout="auto"
    data-app-title="☕ DigiCaf"
    data-user="Admin"
    data-page-title="Judul Halaman"
  >
    <div class="view view-main">
      <div class="page">
        <div class="page-content">
          <!-- Isi konten… -->
          <div class="card" style="padding:16px;">
            Isi konten…
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/layout.js"></script>
  <script src="../node_modules/framework7/framework7-bundle.js"></script>
  <!-- script app.js kamu taruh SETELAH layout + framework7 -->
  <!-- <script src="js/app.js"></script> -->
  <script src="../js/navbar.js"></script>
</body>
</html>
