<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1024, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>DigiCaf - Dashboard</title>
  <!-- Tablet layout helpers -->
  <link rel="stylesheet" href="../css/tablet.css">
  <link rel="stylesheet" href="../css/shared-ui.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Small page-specific tweaks to match other pages' look */
    .dashboard-root{padding-bottom:0}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .stats-card{background:#fff;padding:14px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .card-label{color:#666;font-size:13px;margin-bottom:8px}
    .card-value{color:#8B4513;font-weight:700;font-size:20px}
    .quick-actions{display:flex;gap:10px;margin-bottom:16px}
    .action-btn{flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer}
    .section{margin-bottom:16px}
    .section h3{margin-bottom:8px}
  </style>
</head>
<body>
  <div class="dashboard-root" data-digicaf-layout="auto" data-page-title="Dashboard">

      <div class="stats-grid">
        <div class="stats-card">
          <div class="card-label">Pendapatan Hari Ini</div>
          <div class="card-value">Rp 0</div>
        </div>
        <div class="stats-card">
          <div class="card-label">Transaksi</div>
          <div class="card-value">0</div>
        </div>
        <div class="stats-card">
          <div class="card-label">Menu Terlaris</div>
          <div class="card-value">-</div>
        </div>
        <div class="stats-card">
          <div class="card-label">Stok Rendah</div>
          <div class="card-value">0</div>
        </div>
      </div>

      <div class="section">
        <h3>Aktivitas Terbaru</h3>
        <div style="background:#fff;padding:12px;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04);min-height:80px">Belum ada aktivitas.</div>
      </div>

      <div class="section">
        <h3>Tindakan Cepat</h3>
        <div class="quick-actions">
          <div class="action-btn" onclick="location.href='../Transaksi/index.html'">Buka POS</div>
          <div class="action-btn" onclick="location.href='../Manejemen_stok/index.html'">Stok</div>
          <div class="action-btn" onclick="location.href='../Manajemen_Karyawan/index.html'">Karyawan</div>
        </div>
      </div>

    <!-- Bottom Navigation injected by centralized script -->
  </div>

  <script src="../js/api-helper.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
