<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui"/>
  <title>Digicaff Framework7 Vanilla</title>
  <!-- Framework7 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@7/framework7-bundle.min.css" />
  <link rel="stylesheet" href="../css/shared-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- App root element -->
  <div id="app" data-digicaf-layout="auto" data-page-title="POS">
    <!-- Main View -->
    <div class="view view-main">
      <div class="page">
        <div class="page-content transaksi-page">
          <div class="transaksi-flex">
            <div class="produk-panel">
              <h2>Daftar Produk</h2>
              <div class="produk-list">
                <div class="produk-item">
                  <span class="produk-nama">Espresso</span>
                  <span class="produk-harga">Rp 20.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Espresso" data-harga="20000">Tambah</button>
                </div>
                <div class="produk-item">
                  <span class="produk-nama">Cappuccino</span>
                  <span class="produk-harga">Rp 25.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Cappuccino" data-harga="25000">Tambah</button>
                </div>
                <div class="produk-item">
                  <span class="produk-nama">Latte</span>
                  <span class="produk-harga">Rp 23.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Latte" data-harga="23000">Tambah</button>
                </div>
                <div class="produk-item">
                  <span class="produk-nama">Americano</span>
                  <span class="produk-harga">Rp 18.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Americano" data-harga="18000">Tambah</button>
                </div>
                <div class="produk-item">
                  <span class="produk-nama">Mocha</span>
                  <span class="produk-harga">Rp 27.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Mocha" data-harga="27000">Tambah</button>
                </div>
                <div class="produk-item">
                  <span class="produk-nama">Affogato</span>
                  <span class="produk-harga">Rp 30.000</span>
                  <input type="number" min="1" value="1" class="produk-jumlah" />
                  <button class="btn-tambah" data-nama="Affogato" data-harga="30000">Tambah</button>
                </div>
              </div>
            </div>
            <div class="keranjang-panel">
              <h2>Keranjang</h2>
              <ul id="keranjang-list"></ul>
              <div class="total">
                Total: <span id="total-harga">Rp 0</span>
              </div>
              <div class="input-uang">
                <label for="uang-customer">Uang Customer:</label>
                <input type="number" id="uang-customer" min="0" value="0" />
              </div>
              <div class="kembalian">
                Kembalian: <span id="kembalian">Rp 0</span>
              </div>
              <button id="btn-bayar" class="btn-bayar">Bayar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Framework7 JS -->
  <script src="https://cdn.jsdelivr.net/npm/framework7@7/framework7-bundle.min.js"></script>
  <!-- API Helper -->
  <script src="../js/api-helper.js"></script>
  <!-- Custom JS -->
  <script src="js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/navbar.js"></script>
</body>
</html>
