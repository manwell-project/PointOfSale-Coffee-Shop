<body>
  <div class="stock-wrapper">
    <div class="stock-container">
      <div class="stock-header">
        <div class="stock-header-left">
          <h1 class="stock-title">
            <i class="fas fa-bell"></i>
            Notifikasi Stok
          </h1>
          <p class="stock-subtitle">Daftar notifikasi stok rendah dan stok habis</p>
        </div>
        <div class="stock-header-actions">
          <button class="btn-export" id="refreshAlertsBtn" type="button">
            <i class="fas fa-rotate"></i>
            Refresh
          </button>
          <button class="btn-add-stock" id="backToStockBtn" type="button">
            <i class="fas fa-arrow-left"></i>
            Kembali
          </button>
        </div>
      </div>

      <div class="alerts-page">
        <div class="alerts-header">
          <h3 class="alerts-title">
            <i class="fas fa-bell"></i>
            Notifikasi Stok
            <span class="alerts-badge" id="alertsBadgePage">0</span>
          </h3>
          <div class="alerts-actions">
            <button class="btn-alert-filter active" data-filter="all" type="button">Semua</button>
            <button class="btn-alert-filter" data-filter="critical" type="button">Kritis</button>
            <button class="btn-alert-filter" data-filter="warning" type="button">Peringatan</button>
          </div>
        </div>

        <div class="alerts-list alerts-list-page" id="alertsPageList">
          <div class="alerts-empty">
            <div class="empty-alert-icon"><i class="fas fa-spinner fa-spin"></i></div>
            <div class="empty-alert-title">Memuat notifikasi...</div>
            <div class="empty-alert-text">Mohon tunggu sebentar</div>
          </div>
        </div>

        <div class="alerts-footer">
          <button class="btn-mark-read" id="markAllReadPage" type="button">Tandai Sudah Dibaca</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav">
